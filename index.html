<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Elvira Grima</title>

<style>

@font-face{
    font-family:"Scaver";
    src:url("Scaver-Regular.ttf") format("truetype");
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{

    background:linear-gradient(135deg,#eef7ff,#f7f0ff,#fff8e8);

    color:#222;

}

/* ---------- MENÚ ---------- */

nav{

    position:fixed;

    top:0;

    width:100%;

    display:flex;

    justify-content:flex-end;

    padding:30px 60px;

    z-index:100;

}

nav a{

    margin-left:40px;

    text-decoration:none;

    color:#555;

    font-family:Arial, Helvetica, sans-serif;

    font-size:15px;

    transition:0.3s;

}

nav a:hover{

    color:#000;

}

/* ---------- PORTADA ---------- */

.hero{

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

}

.contenedor{

    width:90%;

    max-width:900px;

    text-align:center;

}

h1{

    font-family:"Scaver", serif;

    font-size:5.3rem;

    font-weight:600;

    letter-spacing:2px;

    margin-bottom:55px;

}

h2{

    font-family:"Helvetica Neue", Arial, sans-serif;

    font-size:1.25rem;

    font-weight:300;

    color:#555;

    line-height:1.8;

    margin-bottom:55px;

}

h3{

    font-family:"Helvetica Neue", Arial, sans-serif;

    font-size:1rem;

    font-weight:400;

    letter-spacing:5px;

    text-transform:uppercase;

    color:#777;

}

.flecha{

    position:absolute;

    bottom:40px;

    width:100%;

    text-align:center;

    font-size:32px;

    color:#666;

}

</style>

</head>

<body>

<nav>

<a href="#">Inicio</a>

<a href="#sobre">Sobre mí</a>

<a href="#proyectos">Proyectos</a>

<a href="#contacto">Contacto</a>

</nav>

<section class="hero">

<div class="contenedor">

<h1>Elvira Grima</h1>

<h2>
Técnica Superior en Realización de Proyectos Audiovisuales y Espectáculos
</h2>

<h3>
Producción Audiovisual · Cine Documental
</h3>

</div>

<div class="flecha">
↓
</div>

</section>

</body>

</html>
