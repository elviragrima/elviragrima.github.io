<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Elvira Grima</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">

<style>

@font-face{
    font-family:"Scaver";
    src:url("Scaver-Regular.ttf") format("truetype");
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(135deg,#eef7ff,#f7f0ff,#fff8e8);

    color:#222;

}

.contenedor{

    width:90%;
    max-width:850px;

    text-align:center;

}

h1{

    font-family:"Scaver", serif;

    font-size:5rem;

    font-weight:500;

    letter-spacing:1px;

    margin-bottom:30px;

}

h2{

    font-family:"Cormorant Garamond", serif;

    font-size:1.8rem;

    font-weight:300;

    color:#4d4d4d;

    line-height:1.4;

    margin-bottom:30px;

}

h3{

    font-family:"Cormorant Garamond", serif;

    font-size:1.3rem;

    font-weight:300;

    color:#6d6d6d;

}

</style>

</head>

<body>

<div class="contenedor">

<h1>Elvira Grima</h1>

<h2>
Técnica Superior en Realización de Proyectos Audiovisuales y Espectáculos
</h2>

<h3>
Producción audiovisual · Cine documental
</h3>

</div>

</body>

</html>
