<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Elvira Grima</title>

<style>

@font-face{
    font-family:"Scaver";
    src:url("Scaver-Regular.ttf") format("truetype");
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(135deg,#eef7ff,#f7f0ff,#fff8e8);

    color:#222;

}

.contenedor{

    width:90%;
    max-width:900px;

    text-align:center;

}

h1{

    font-family:"Scaver", serif;

    font-size:5.3rem;

    font-weight:600;

    letter-spacing:2px;

    margin-bottom:55px;

}

h2{

    font-family:"Helvetica Neue", Arial, sans-serif;

    font-size:1.25rem;

    font-weight:300;

    color:#555;

    line-height:1.8;

    margin-bottom:55px;

}

h3{

    font-family:"Helvetica Neue", Arial, sans-serif;

    font-size:1rem;

    font-weight:400;

    letter-spacing:5px;

    text-transform:uppercase;

    color:#777;

}

</style>

</head>

<body>

<div class="contenedor">

<h1>Elvira Grima</h1>

<h2>
Técnica Superior en Realización de Proyectos Audiovisuales y Espectáculos
</h2>

<h3>
Producción Audiovisual · Cine Documental
</h3>

</div>

</body>

</html>
